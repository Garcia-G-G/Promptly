# Kamal 2 deployment configuration.
#
# Hosts, image registry, and app host are driven by environment variables
# so the same file works across staging and production without rewriting.
service: promptly

image: <%= ENV["DOCKER_REGISTRY"] || "ghcr.io" %>/<%= ENV["DOCKER_REPO"] || "promptly-dev/promptly" %>

servers:
  web:
    hosts:
      - <%= ENV["WEB_HOST"] || "192.168.0.1" %>
    labels:
      logging: "production"
    options:
      memory: "512m"
      memory-reservation: "256m"
  job:
    hosts:
      - <%= ENV["JOB_HOST"] || ENV["WEB_HOST"] || "192.168.0.1" %>
    cmd: bin/jobs
    options:
      memory: "512m"
      memory-reservation: "256m"

proxy:
  ssl: true
  host: <%= ENV["APP_HOST"] || "app.promptly.dev" %>
  healthcheck:
    interval: 3
    path: /up
    timeout: 5

registry:
  server: <%= ENV["DOCKER_REGISTRY"] || "ghcr.io" %>
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    RAILS_LOG_LEVEL: info
    RAILS_SERVE_STATIC_FILES: "true"
    WEB_CONCURRENCY: "2"
    SOLID_QUEUE_IN_PUMA: "false"
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - REDIS_URL
    - STRIPE_SECRET_KEY
    - STRIPE_WEBHOOK_SECRET
    - OPENAI_API_KEY
    - OTEL_EXPORTER_OTLP_ENDPOINT
    - SENTRY_DSN
    - SMTP_ADDRESS
    - SMTP_USERNAME
    - SMTP_PASSWORD
    - MAILER_FROM
    - APP_HOST

asset_path: /rails/public/assets

logging:
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

accessories:
  redis:
    image: redis:7-alpine
    host: <%= ENV["REDIS_HOST"] || ENV["WEB_HOST"] || "192.168.0.1" %>
    port: "127.0.0.1:6379:6379"
    cmd: "redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru"
    options:
      memory: "256m"

builder:
  arch: amd64

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"
